name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions (principle of least privilege). Jobs that need more
# (e.g., release uploads) should override at the job level.
permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package (with dev extras, fallback to pytest)
        shell: bash
        run: |
          python -m pip install -e ".[dev]" || python -m pip install -e . pytest

      - name: Run tests
        run: pytest tests/ -v
